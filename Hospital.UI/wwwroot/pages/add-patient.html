<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Patient | Hospital System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Patient Registration</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="list-patients.html">List Patients</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Patient Entry Form</h2>
            <form action="#">
                <div>
                    <label for="patientName">Patient Name:</label>
                    <input type="text" id="patientName" name="patientName" required placeholder="Full Name">
                </div>

                <div>
                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" min="1" max="120" required>
                </div>

                <div>
                    <label for="condition">Condition:</label>
                    <input type="text" id="condition" name="condition" required placeholder="Symptoms/Diagnosis">
                </div>

                <div>
                    <label for="appointmentDate">Appointment Date:</label>
                    <input type="date" id="appointmentDate" name="appointmentDate" required>
                </div>

                <div>
                    <label for="doctorId">Assigned Doctor ID:</label>
                    <input type="number" id="doctorId" name="doctorId" required pattern="[0-9]*">
                </div>

                <div>
                    <button type="submit">Register Patient</button>
                    <button type="reset">Clear Data</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hospital Management System</p>
    </footer>
</body>
</html>
